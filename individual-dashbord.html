<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1628;
  --navy2: #0D2045;
  --blue: #1A4A8A;
  --teal: #0D7A6B;
  --green: #00C48C;
  --amber: #F5A623;
  --red: #E84545;
  --purple: #7C3AED;
  --light: #F0F4FF;
  --card-bg: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text-main: #E8EEFF;
  --text-muted: #8899BB;
  --b1-color: #00C48C;
  --a2-adv-color: #3B82F6;
  --a2-int-color: #F59E0B;
  --a2-beg-color: #F97316;
  --a1-color: #EF4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--navy);
  color: var(--text-main);
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 10% 20%, rgba(13,122,107,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(26,74,138,0.15) 0%, transparent 50%);
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--navy2) 0%, #0a1f3d 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}
.header-title {
  font-family: 'Tajawal', sans-serif;
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--green) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
.cefr-badge {
  background: linear-gradient(135deg, var(--teal), var(--green));
  padding: 8px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* Student Selector */
.selector-bar {
  padding: 24px 40px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.selector-label { font-size: 13px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
.student-chips { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
.chip {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-muted);
  font-size: 12px;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--green); color: var(--green); }
.chip.active {
  background: linear-gradient(135deg, var(--teal), var(--green));
  border-color: var(--green);
  color: white;
  font-weight: 700;
}

/* Main Layout */
.main { padding: 32px 40px; }

/* Student Card Hero */
.student-hero {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 24px;
  align-items: center;
  background: linear-gradient(135deg, rgba(13,122,107,0.15) 0%, rgba(26,74,138,0.15) 100%);
  border: 1px solid rgba(0,196,140,0.2);
  border-radius: 20px;
  padding: 28px 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.student-hero::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(0,196,140,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.student-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--green));
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900;
  border: 3px solid rgba(0,196,140,0.3);
}
.student-info h2 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.student-info p { font-size: 13px; color: var(--text-muted); }
.student-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.meta-tag {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 4px 10px; border-radius: 8px;
}
.meta-tag span { color: var(--text-main); font-weight: 600; }
.score-display {
  text-align: center;
  background: rgba(0,0,0,0.2);
  border-radius: 16px;
  padding: 20px 28px;
  border: 1px solid var(--border);
}
.score-number { font-size: 48px; font-weight: 900; line-height: 1; }
.score-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.level-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 8px;
}

/* Grid layout */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-full { margin-bottom: 20px; }

/* Cards */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  transition: border-color 0.3s;
}
.card:hover { border-color: rgba(0,196,140,0.3); }
.card-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.card-title { font-size: 15px; font-weight: 700; }
.card-sub { font-size: 11px; color: var(--text-muted); }

/* Skill Bars */
.skill-item { margin-bottom: 16px; }
.skill-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.skill-name { font-weight: 600; }
.skill-score { font-weight: 700; }
.skill-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.skill-fill {
  height: 100%; border-radius: 4px;
  transition: width 1s ease;
  position: relative;
}
.skill-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 100%;
  background: rgba(255,255,255,0.4);
  border-radius: 4px;
}

/* Progress Timeline */
.timeline { position: relative; }
.timeline-row {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.timeline-row:last-child { border-bottom: none; }
.test-label { font-size: 12px; color: var(--text-muted); min-width: 90px; }
.test-bar-wrap { flex: 1; height: 28px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; position: relative; }
.test-bar {
  height: 100%; border-radius: 6px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px;
  font-size: 12px; font-weight: 700; color: white;
  transition: width 1.2s ease;
}
.test-mark { min-width: 36px; font-size: 14px; font-weight: 700; text-align: center; }
.test-change { min-width: 50px; font-size: 12px; text-align: left; }
.change-up { color: var(--green); }
.change-down { color: var(--red); }
.change-neutral { color: var(--text-muted); }

/* Issues Grid */
.issue-list { display: flex; flex-direction: column; gap: 10px; }
.issue-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  border-right: 3px solid var(--red);
}
.issue-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.issue-text { font-size: 13px; line-height: 1.6; color: var(--text-main); }
.issue-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  margin-bottom: 4px;
}

/* Remedial Plan */
.plan-steps { display: flex; flex-direction: column; gap: 10px; }
.plan-step {
  display: flex; gap: 14px;
  padding: 14px 16px;
  background: rgba(0,196,140,0.06);
  border-radius: 12px;
  border: 1px solid rgba(0,196,140,0.12);
  align-items: flex-start;
}
.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--green));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
}
.step-content { flex: 1; }
.step-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.step-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* Participation Table */
.parti-table { width: 100%; border-collapse: collapse; }
.parti-table th {
  background: rgba(255,255,255,0.05);
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-align: center;
}
.parti-table td {
  padding: 10px 12px;
  font-size: 12px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.parti-badge {
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 11px;
}

/* Attendance bar */
.attendance-visual {
  display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0;
}
.att-dot {
  width: 14px; height: 14px; border-radius: 3px;
  flex-shrink: 0;
}

/* Section divider */
.section-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 20px;
}
.section-divider-line { flex: 1; height: 1px; background: var(--border); }
.section-divider-text { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

/* Hidden pages */
.student-page { display: none; }
.student-page.active { display: block; }

/* Responsive */
@media (max-width: 768px) {
  .main { padding: 20px; }
  .header { padding: 16px 20px; }
  .selector-bar { padding: 16px 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .student-hero { grid-template-columns: 1fr; }
}

.no-data { color: var(--text-muted); font-size: 13px; font-style: italic; }

/* Gauge */
.gauge-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
.gauge-svg { transform: rotate(-90deg); }
.gauge-text { font-size: 22px; font-weight: 900; margin-top: -4px; }
.gauge-label { font-size: 11px; color: var(--text-muted); }

</style>
</head>

const participationColors = {
  'excellent': { bg: 'rgba(0,196,140,0.2)', color: '#00C48C' },
  'Very good': { bg: 'rgba(59,130,246,0.2)', color: '#60A5FA' },
  'good': { bg: 'rgba(245,158,11,0.2)', color: '#F59E0B' },
  'fair': { bg: 'rgba(249,115,22,0.2)', color: '#FB923C' },
  'Poor': { bg: 'rgba(239,68,68,0.2)', color: '#EF4444' },
  'poor': { bg: 'rgba(239,68,68,0.2)', color: '#EF4444' },
  'still': { bg: 'rgba(100,100,100,0.2)', color: '#888' },
};

function getChange(tests, idx) {
  if (idx === 0) return null;
  let prev = null, curr = tests[idx];
  for (let i = idx - 1; i >= 0; i--) {
    if (tests[i] !== null) { prev = tests[i]; break; }
  }
  if (prev === null || curr === null) return null;
  const diff = curr - prev;
  return diff;
}

function getBarColor(score) {
  if (score >= 80) return 'linear-gradient(90deg, #00C48C, #00E5A8)';
  if (score >= 65) return 'linear-gradient(90deg, #3B82F6, #60A5FA)';
  if (score >= 50) return 'linear-gradient(90deg, #F59E0B, #FCD34D)';
  return 'linear-gradient(90deg, #EF4444, #F87171)';
}

function getIssueTagColor(tag) {
  const map = {
    'قواعد': { bg: 'rgba(245,158,11,0.2)', color: '#F59E0B' },
    'مفردات': { bg: 'rgba(59,130,246,0.2)', color: '#3B82F6' },
    'كلام': { bg: 'rgba(249,115,22,0.2)', color: '#F97316' },
    'حضور': { bg: 'rgba(239,68,68,0.2)', color: '#EF4444' },
    'أداء': { bg: 'rgba(239,68,68,0.2)', color: '#EF4444' },
    'شامل': { bg: 'rgba(124,58,237,0.2)', color: '#7C3AED' },
    'استماع': { bg: 'rgba(20,184,166,0.2)', color: '#14B8A6' },
    'قراءة': { bg: 'rgba(6,182,212,0.2)', color: '#06B6D4' },
    'كتابة': { bg: 'rgba(245,158,11,0.2)', color: '#F59E0B' },
    'مشاركة': { bg: 'rgba(249,115,22,0.2)', color: '#F97316' },
    'حروف الجر': { bg: 'rgba(168,85,247,0.2)', color: '#A855F7' },
  };
  return map[tag] || { bg: 'rgba(100,100,100,0.2)', color: '#888' };
}

function buildStudentPage(s) {
  const scores = s.tests.filter(x => x !== null);
  const avgScore = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const maxScore = scores.length ? Math.max(...scores) : 0;
  const lastScore = [...s.tests].reverse().find(x => x !== null) || s.placement;
  
  let issuesHtml = s.issues.map(i => {
    const tc = getIssueTagColor(i.tag);
    return `<div class="issue-item">
      <div class="issue-icon">⚠️</div>
      <div>
        <span class="issue-tag" style="background:${tc.bg};color:${tc.color}">${i.tag}</span>
        <div class="issue-text">${i.text}</div>
      </div>
    </div>`;
  }).join('');

  let strengthsHtml = s.strengths.length ? s.strengths.map(str =>
    `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,196,140,0.08);border-radius:8px;margin-bottom:8px;font-size:13px;">
      <span>✅</span><span>${str}</span>
    </div>`
  ).join('') : '<div class="no-data">لا توجد نقاط قوة مسجلة</div>';

  let remedialHtml = s.remedial.map((r, i) =>
    `<div class="plan-step">
      <div class="step-num">${i+1}</div>
      <div class="step-content">
        <div class="step-title">${r.title}</div>
        <div class="step-desc">${r.desc}</div>
      </div>
    </div>`
  ).join('');

  let testsHtml = s.tests.map((t, i) => {
    const change = getChange(s.tests, i);
    const hasVal = t !== null;
    const pct = hasVal ? t : 0;
    const changeHtml = change !== null 
      ? `<span class="${change>0?'change-up':change<0?'change-down':'change-neutral'}">${change>0?'+':''}${change}</span>`
      : '<span class="change-neutral">—</span>';
    return `<div class="timeline-row">
      <div class="test-label">${s.testNames[i]}</div>
      <div class="test-bar-wrap">
        ${hasVal ? `<div class="test-bar" style="width:${pct}%;background:${getBarColor(pct)}">${pct}</div>` : '<div style="color:var(--text-muted);font-size:11px;padding:7px 10px">لا يوجد</div>'}
      </div>
      <div class="test-mark" style="color:${hasVal?'var(--text-main)':'var(--text-muted)'}">${hasVal?t+'%':'—'}</div>
      <div class="test-change">${i>0?changeHtml:''}</div>
    </div>`;
  }).join('');

  let attHtml = s.attDots.map(d =>
    `<div class="att-dot" style="background:${d?'var(--green)':'rgba(239,68,68,0.5)'}"></div>`
  ).join('');

  let participationHtml = '';
  if (s.participation) {
    const skills = [
      { key: 'listening', label: 'الاستماع' },
      { key: 'speaking', label: 'الكلام' },
      { key: 'conversation', label: 'المحادثة' },
      { key: 'writing', label: 'الكتابة' }
    ];
    participationHtml = `
      <div class="card">
        <div class="card-header">
          <div class="card-icon" style="background:rgba(20,184,166,0.15)">📝</div>
          <div><div class="card-title">المشاركة في الجلسات</div><div class="card-sub">Session Participation</div></div>
        </div>
        <table class="parti-table">
          <tr>
            ${skills.map(sk => `<th>${sk.label}</th>`).join('')}
          </tr>
          <tr>
            ${skills.map(sk => {
              const val = s.participation[sk.key] || '—';
              const pc = participationColors[val] || { bg:'rgba(100,100,100,0.2)', color:'#888' };
              return `<td><span class="parti-badge" style="background:${pc.bg};color:${pc.color}">${val}</span></td>`;
            }).join('')}
          </tr>
        </table>
      </div>`;
  }

  const attendancePct = parseFloat(s.attendance);
  const attColor = attendancePct >= 70 ? 'var(--green)' : attendancePct >= 50 ? 'var(--amber)' : 'var(--red)';

  return `
    <div class="student-page" id="page-${s.id}">
      <!-- Hero -->
      <div class="student-hero">
        <div class="student-avatar">${s.initial}</div>
        <div class="student-info">
          <h2>${s.name}</h2>
          <div class="student-meta">
            <div class="meta-tag">المستوى الحالي: <span style="color:${s.levelColor}">${s.level}</span></div>
            <div class="meta-tag">الحضور: <span style="color:${attColor}">${s.attendance}</span></div>
            <div class="meta-tag">آخر درجة: <span>${lastScore}%</span></div>
            <div class="meta-tag">الجهة: <span>STA</span></div>
          </div>
        </div>
        <div class="score-display">
          <div class="score-number" style="color:${s.levelColor}">${lastScore}</div>
          <div class="score-label">آخر نتيجة %</div>
          <div class="level-badge" style="background:${s.levelColor}22;color:${s.levelColor}">${s.level}</div>
        </div>
      </div>

      <!-- Row 1 -->
      <div class="grid-2">
        <!-- Progress Chart -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon" style="background:rgba(0,196,140,0.15)">📈</div>
            <div><div class="card-title">مسار الأداء عبر الاختبارات</div><div class="card-sub">Performance Timeline</div></div>
          </div>
          <div class="timeline">${testsHtml}</div>
        </div>

        <!-- Issues -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon" style="background:rgba(239,68,68,0.15)">🔍</div>
            <div><div class="card-title">تحليل الأخطاء ونقاط الضعف</div><div class="card-sub">Error Analysis</div></div>
          </div>
          <div class="issue-list">${issuesHtml || '<div class="no-data">لا توجد أخطاء مسجلة</div>'}</div>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="grid-2">
        <!-- Strengths -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon" style="background:rgba(0,196,140,0.15)">💪</div>
            <div><div class="card-title">نقاط القوة</div><div class="card-sub">Strengths</div></div>
          </div>
          ${strengthsHtml}
        </div>

        <!-- Attendance -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon" style="background:rgba(124,58,237,0.15)">📅</div>
            <div><div class="card-title">نسبة الحضور والغياب</div><div class="card-sub">Attendance Record</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
            <div style="font-size:38px;font-weight:900;color:${attColor}">${s.attendance}</div>
            <div>
              <div style="font-size:12px;color:var(--text-muted)">من 16 جلسة</div>
              <div style="font-size:11px;margin-top:4px;color:${attColor}">${attendancePct>=70?'✅ جيد':attendancePct>=50?'⚠️ متوسط':'🔴 ضعيف – يستوجب تدخلاً'}</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">سجل الجلسات (أخضر = حاضر / أحمر = غائب):</div>
          <div class="attendance-visual">${attHtml}</div>
        </div>
      </div>

      <!-- Participation -->
      ${participationHtml}

      <!-- Remedial Plan -->
      <div class="card grid-full">
        <div class="card-header">
          <div class="card-icon" style="background:rgba(124,58,237,0.15)">🎯</div>
          <div><div class="card-title">الخطة العلاجية الفردية</div><div class="card-sub">Individualized Remedial Plan</div></div>
        </div>
        <div class="plan-steps">${remedialHtml}</div>
      </div>
    </div>
  `;
}

// Build UI
const chipsEl = document.getElementById('chips');
const mainEl = document.getElementById('main-content');

students.forEach(s => {
  // Chip
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.textContent = s.name.split(' ').slice(0,2).join(' ');
  chip.onclick = () => selectStudent(s.id);
  chip.id = 'chip-' + s.id;
  chipsEl.appendChild(chip);

  // Page
  mainEl.innerHTML += buildStudentPage(s);
});

function selectStudent(id) {
  document.querySelectorAll('.student-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('chip-' + id).classList.add('active');
}

// Default: first student
selectStudent(1);
